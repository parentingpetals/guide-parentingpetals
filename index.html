<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parenting Petals Guide</title>
    
    <!-- PWA Manifest & Theme -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0D0B14">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        /* Professional Dark Purple Theme Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0D0B14; /* Deep Royal Dark Purple */
            color: #F1EDFA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* Premium Dashboard Card */
        .container {
            max-width: 420px;
            width: 100%;
            background: #161224; /* Muted Velvet Purple */
            padding: 45px 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid #2A2240; /* Subtle Neon Purple Border Accent */
        }

        /* Brand Logo / Header Styling */
        .brand-logo {
            font-size: 32px;
            font-weight: 700;
            color: #C0A9F6; /* Vibrant Soft Purple Accent */
            margin-bottom: 40px; /* Text hatne ke baad spacing thodi bada di hai balance ke liye */
            letter-spacing: 0.8px;
        }

        /* Professional Action Button */
        .cta-button {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background: #C0A9F6;
            color: #0D0B14;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(192, 169, 246, 0.2);
            margin-bottom: 15px;
            border: none;
            cursor: pointer;
        }

        .cta-button:hover {
            background: #A98DF2;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(192, 169, 246, 0.4);
        }

        /* PWA Install Button */
        #installBtn {
            display: none;
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #C0A9F6;
            font-size: 14px;
            font-weight: 600;
            border: 2px solid #C0A9F6;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #installBtn:hover {
            background: rgba(192, 169, 246, 0.1);
        }

        /* Footer Info */
        .footer-text {
            font-size: 11px;
            color: #554C6E;
            margin-top: 40px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Brand Name -->
        <div class="brand-logo">Parenting Petals</div>

        <!-- Main Link Button -->
        <a href="https://sites.google.com/view/guide-parentingpetals/home" target="_blank" class="cta-button">
            Open Parenting Guide
        </a>

        <!-- App Installation Button for PWA -->
        <button id="installBtn">Install Web App</button>

        <div class="footer-text">Powered by Parenting Petals &copy; 2026</div>
    </div>

    <script>
        // Service Worker Registration for PWA Compliance
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Registered Successfully"))
            .catch(err => console.log("Service Worker Registration Failed", err));
        }

        // PWA Installation Prompt Logic
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User installed the PWA');
                    }
                    installBtn.style.display = 'none';
                    deferredPrompt = null;
                });
            }
        });
    </script>
</body>
</html>
