<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parenting Petals Guide</title>
    
    <!-- PWA Manifest & Theme -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#090514">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #090514;
            --card-bg: rgba(22, 14, 43, 0.65);
            --neon-accent: #c0a9f6;
            --secondary-accent: #ffb6c1;
            --text-main: #f1edfa;
            --text-muted: #9e93be;
            --glow-color: rgba(192, 169, 246, 0.4);
            --pink-glow: rgba(255, 182, 193, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(26, 11, 46, 0.8) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(45, 16, 74, 0.5) 0%, transparent 50%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            padding: 24px;
        }

        #petal-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 400px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px 35px;
            border-radius: 28px;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                inset 0 0 20px rgba(192, 169, 246, 0.05);
            border: 1px solid rgba(192, 169, 246, 0.15);
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container:hover {
            transform: translateY(-4px);
            border-color: rgba(192, 169, 246, 0.25);
        }

        .logo-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-glow-ring {
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--neon-accent), var(--secondary-accent), #8a2be2, var(--secondary-accent));
            background-size: 300% 300%;
            animation: spinGlow 6s linear infinite, pulseGlow 3s ease-in-out infinite alternate;
            z-index: 1;
            filter: blur(4px);
            opacity: 0.85;
        }

        .logo-inner-frame {
            position: relative;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #110924;
            padding: 4px;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            z-index: 3;
            transition: transform 0.5s ease;
        }

        .logo-wrapper:hover .logo-img {
            transform: scale(1.1) rotate(5deg);
        }

        /* Ambient sparkling particles around the logo */
        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 10px #fff, 0 0 20px var(--neon-accent);
            opacity: 0;
            pointer-events: none;
            z-index: 4;
            animation: sparkleAnim 3s infinite ease-in-out;
        }

        .sparkle-1 { top: 10px; left: 10px; animation-delay: 0.2s; }
        .sparkle-2 { bottom: 15px; right: 8px; animation-delay: 1.1s; }
        .sparkle-3 { top: 50%; right: -5px; animation-delay: 2s; }

        .brand-logo {
            font-family: 'Comfortaa', cursive;
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, var(--text-main) 20%, var(--neon-accent) 50%, var(--secondary-accent) 80%, var(--text-main) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 4s linear infinite, floatHeading 4s ease-in-out infinite;
            margin-bottom: 40px;
            transition: text-shadow 0.4s ease;
        }

        .cta-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #c0a9f6 0%, #a282f0 100%);
            color: #070312;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 
                0 4px 20px var(--glow-color),
                0 0 0 1px rgba(255, 255, 255, 0.2) inset;
            margin-bottom: 16px;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* Sliding shimmer effect inside button */
        .cta-button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: 0.75s;
            opacity: 0;
        }

        .cta-button:hover::after {
            opacity: 1;
            left: 120%;
            transition: all 0.75s ease;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 10px 30px var(--glow-color),
                0 0 20px var(--pink-glow);
            background: linear-gradient(135deg, #cabafe 0%, #b294ff 100%);
        }

        .cta-button:active {
            transform: translateY(-1px);
        }

        /* PWA Install Button */
        #installBtn {
            display: none;
            width: 100%;
            padding: 15px;
            background: rgba(192, 169, 246, 0.05);
            color: var(--neon-accent);
            font-size: 14px;
            font-weight: 600;
            border: 2px solid rgba(192, 169, 246, 0.3);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        #installBtn:hover {
            background: rgba(192, 169, 246, 0.15);
            border-color: var(--neon-accent);
            color: #fff;
            box-shadow: 0 0 15px rgba(192, 169, 246, 0.2);
        }

        .footer-text {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 35px;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        @keyframes spinGlow {
            0% { background-position: 0% 50%; transform: rotate(0deg); }
            100% { background-position: 300% 50%; transform: rotate(360deg); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px var(--glow-color); }
            100% { box-shadow: 0 0 35px var(--pink-glow), 0 0 15px var(--glow-color); }
        }

        @keyframes gradientText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes sparkleAnim {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2) translateY(-5px); }
        }

        /* Gentle floating and glowing text animation */
        @keyframes floatHeading {
            0% {
                transform: translateY(0px);
                text-shadow: 0 4px 15px rgba(192, 169, 246, 0.2);
            }
            50% {
                transform: translateY(-8px);
                text-shadow: 0 15px 25px rgba(192, 169, 246, 0.4), 0 0 15px rgba(255, 182, 193, 0.3);
            }
            100% {
                transform: translateY(0px);
                text-shadow: 0 4px 15px rgba(192, 169, 246, 0.2);
            }
        }

        /* SVG backup icon styling when icon-521.png is missing */
        .svg-backup {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #190e31;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <!-- Falling Petals Background Canvas -->
    <canvas id="petal-canvas"></canvas>

    <div class="container">
        <!-- Circular Framing with Glowing Ring -->
        <div class="logo-wrapper">
            <div class="logo-glow-ring"></div>
            
            <!-- Twinkling Sparkle overlays -->
            <div class="sparkle sparkle-1"></div>
            <div class="sparkle sparkle-2"></div>
            <div class="sparkle sparkle-3"></div>

            <div class="logo-inner-frame">
                <!-- If image fails to load, it cleanly shows a beautiful nested SVG icon fallback -->
                <img class="logo-img" src="icon-512.png" alt="Logo" onerror="showSvgFallback(this)">
            </div>
        </div>

        <!-- Animating Heading -->
        <div class="brand-logo">Parenting Petals</div>

        <!-- Sleek CTA Link Button -->
        <a href="https://sites.google.com/view/guide-parentingpetals/home" target="_blank" class="cta-button">
            <span>Open Parenting Guide</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
        </a>

        <!-- Install Web App Button for PWA compliance -->
        <button id="installBtn">Install Web App</button>

        <div class="footer-text">Powered by Parenting Petals &copy; 2026</div>
    </div>

    <script>
        const canvas = document.getElementById('petal-canvas');
        const ctx = canvas.getContext('2d');

        let petalsArray = [];
        const maxPetals = 28; // Balanced density to prevent screen clutter

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Beautiful shades of pastel pink and purple flower petals
        const petalColors = [
            'rgba(240, 192, 246, 0.7)', // Soft Lavender Pink
            'rgba(255, 182, 193, 0.65)', // Pastel Pink
            'rgba(192, 169, 246, 0.55)', // Light Neon Purple Accent
            'rgba(255, 218, 224, 0.75)'  // Pale Cherry Blossom
        ];

        class Petal {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 12 + 8;
                this.speedX = Math.random() * 1.5 - 0.5;
                this.speedY = Math.random() * 1.2 + 0.8;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 1.5 - 0.75;
                this.color = petalColors[Math.floor(Math.random() * petalColors.length)];
                this.windSway = Math.random() * 1.5;
                this.swaySpeed = Math.random() * 0.02 + 0.01;
                this.swayOffset = Math.random() * 100;
            }

            update() {
                this.y += this.speedY;
                // Add natural wind sway movement
                this.swayOffset += this.swaySpeed;
                this.x += this.speedX + Math.sin(this.swayOffset) * this.windSway * 0.5;
                this.angle += this.spin;

                // Reset petal position if it drifts off screen
                if (this.y > canvas.height + 20) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                    this.size = Math.random() * 12 + 8;
                    this.speedY = Math.random() * 1.2 + 0.8;
                }
                if (this.x > canvas.width + 20 || this.x < -20) {
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.angle * Math.PI) / 180);
                
                // Draw elegant custom petal shape
                ctx.beginPath();
                ctx.fillStyle = this.color;
                
                // Drawing organic heart/petal bezier shape
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size, -this.size / 2, -this.size, this.size, 0, this.size * 1.5);
                ctx.bezierCurveTo(this.size, this.size, this.size, -this.size / 2, 0, 0);
                
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        function initPetals() {
            petalsArray = [];
            for (let i = 0; i < maxPetals; i++) {
                petalsArray.push(new Petal());
            }
        }

        function animatePetals() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < petalsArray.length; i++) {
                petalsArray[i].update();
                petalsArray[i].draw();
            }
            requestAnimationFrame(animatePetals);
        }

        initPetals();
        
        // Start animation after window completely loads
        window.onload = function() {
            animatePetals();
        };

        function showSvgFallback(imageElement) {
            // Replaces broken image with a beautiful glowing SVG lotus/flower vector
            const fallbackHTML = `
                <div class="svg-backup">
                    <svg width="55" height="55" viewBox="0 0 24 24" fill="none" stroke="#c0a9f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        <path d="M12 8c-1.5 0-2.5 1-2.5 2.5S10.5 13 12 14.5s2.5-1 2.5-2.5S13.5 8 12 8z"/>
                        <path d="M12 14.5V18"/>
                    </svg>
                </div>
            `;
            const parent = imageElement.parentElement;
            parent.innerHTML = fallbackHTML;
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Registered Successfully"))
            .catch(err => console.log("Service Worker Registration Failed", err));
        }

        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted PWA installation');
                    }
                    installBtn.style.display = 'none';
                    deferredPrompt = null;
                });
            }
        });
    </script>
</body>
</html>
